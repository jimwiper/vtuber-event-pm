<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
      margin: 12px;
      color: #212121;
    }
    label {
      display: block;
      font-weight: bold;
      margin-top: 12px;
      margin-bottom: 4px;
    }
    input, select, textarea {
      width: 100%;
      padding: 6px 8px;
      box-sizing: border-box;
      border: 1px solid #bdbdbd;
      border-radius: 4px;
      font-size: 13px;
    }
    textarea { height: 60px; resize: vertical; }
    .required::after { content: ' *'; color: #e53935; }
    .hint { font-size: 11px; color: #757575; margin-top: 2px; }
    #submitBtn {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 10px;
      background: #263238;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
    #submitBtn:disabled { background: #90a4ae; cursor: not-allowed; }
    #message {
      margin-top: 12px;
      padding: 10px;
      border-radius: 4px;
      font-size: 12px;
      white-space: pre-wrap;
      display: none;
    }
    .success { background: #e8f5e9; color: #2e7d32; }
    .error   { background: #ffebee; color: #c62828; }
  </style>
</head>
<body>

  <label class="required">イベント名</label>
  <input type="text" id="name" placeholder="例: ぶいすぽフェス2026">

  <label class="required">種別</label>
  <select id="type">
    <option value="">選択してください</option>
    <option value="体験型">体験型</option>
    <option value="ライブ型（3Dあり）">ライブ型（3Dあり）</option>
    <option value="ライブ型（3Dなし）">ライブ型（3Dなし）</option>
    <option value="eスポーツ型">eスポーツ型</option>
    <option value="複合フェス型">複合フェス型</option>
    <option value="コラボ型">コラボ型</option>
  </select>

  <label class="required">開催日</label>
  <input type="date" id="startDate">

  <label>終了日 <span style="font-weight:normal;font-size:11px;">（複数日の場合）</span></label>
  <input type="date" id="endDate">

  <label class="required">収容規模（人）</label>
  <input type="number" id="capacity" placeholder="例: 10000" min="1">

  <label class="required">開催形式</label>
  <select id="format">
    <option value="">選択してください</option>
    <option value="オフラインのみ">オフラインのみ</option>
    <option value="オンラインのみ">オンラインのみ</option>
    <option value="ハイブリッド（オフライン＋配信）">ハイブリッド（オフライン＋配信）</option>
    <option value="ハイブリッド（オフライン＋ライブビューイング＋配信）">ハイブリッド（オフライン＋ライブビューイング＋配信）</option>
  </select>

  <label>予算目安（万円）</label>
  <input type="number" id="budget" placeholder="例: 3000" min="0">

  <label>担当者</label>
  <input type="text" id="manager" placeholder="例: 山田太郎">

  <label>備考・特記事項</label>
  <textarea id="notes" placeholder="例: 3Dモデル新衣装あり、全国4都市ライブビューイング予定"></textarea>
  <div class="hint">Claudeのタスク生成に反映されます。詳しく書くほど精度が上がります。</div>

  <button id="submitBtn" onclick="submitForm()">登録してタスクを自動展開</button>
  <div id="message"></div>

<script>
  function submitForm() {
    const name      = document.getElementById('name').value.trim();
    const type      = document.getElementById('type').value;
    const startDate = document.getElementById('startDate').value;
    const capacity  = document.getElementById('capacity').value;
    const format    = document.getElementById('format').value;

    if (!name || !type || !startDate || !capacity || !format) {
      showMessage('必須項目（*）をすべて入力してください', false);
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '処理中...（30秒ほどかかります）';
    showMessage('', false);

    const formData = {
      name:      name,
      type:      type,
      startDate: startDate,
      endDate:   document.getElementById('endDate').value,
      capacity:  Number(capacity),
      format:    format,
      budget:    document.getElementById('budget').value,
      manager:   document.getElementById('manager').value.trim(),
      notes:     document.getElementById('notes').value.trim(),
    };

    google.script.run
      .withSuccessHandler(onSuccess)
      .withFailureHandler(onError)
      .submitEventForm(formData);
  }

  function onSuccess(result) {
    const btn = document.getElementById('submitBtn');
    btn.disabled = false;
    btn.textContent = '登録してタスクを自動展開';

    if (result.success) {
      showMessage(result.message, true);
    } else {
      showMessage('エラー: ' + result.error, false);
    }
  }

  function onError(err) {
    const btn = document.getElementById('submitBtn');
    btn.disabled = false;
    btn.textContent = '登録してタスクを自動展開';
    showMessage('エラー: ' + err.message, false);
  }

  function showMessage(text, isSuccess) {
    const el = document.getElementById('message');
    el.textContent = text;
    el.className = isSuccess ? 'success' : 'error';
    el.style.display = text ? 'block' : 'none';
  }
</script>
</body>
</html>
